<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account - Final Step</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f5f5f5;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background-color: #ddd;
      font-weight: bold;
    }

    /* ✅ SAME Step Indicator Position */
    .steps {
      position: absolute;
      left: 80px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .step {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #bbb;
    }

    .step.active {
      background-color: #555;
    }

    .line {
      width: 2px;
      height: 40px;
      background-color: #ccc;
      margin: 5px 0;
    }

    /* Container */
    .container {
      width: 600px;
      margin: 60px auto;
      background: #eee;
      padding: 40px;
      border-radius: 8px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    /* Buttons */
    .button-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .btn {
      width: 120px;
      padding: 10px;
      background-color: #999;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Bottom link */
    .bottom-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .bottom-link a {
      text-decoration: underline;
      color: black;
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div>HailShare</div>
    <div>Con Con Con Con Con</div>
  </div>

  <!-- Step Indicator -->
  <div class="steps">
    <div class="step active"></div>
    <div class="line"></div>
    <div class="step active"></div>
    <div class="line"></div>
    <div class="step active"></div>
  </div>

  <!-- Form -->
  <div class="container">
    <h2>Create Your Account</h2>

    <div class="form-group">
      <label>Account Type</label>
      <select>
        <option disabled selected hidden></option>
        <option>Account 1</option>
        <option>Account 2</option>
        <option>Account 3</option>
      </select>
    </div>

    <div class="form-group">
      <label>Security Code</label>
      <input type="text">
    </div>

    <div class="button-row">
      <button class="btn" onclick="location.href='registration2.html'">Back</button>
      <button class="btn">Submit</button>
    </div>

    <div class="bottom-link">
      <a href="login.html">I have an account</a>
    </div>
  </div>

</body>
</html>
