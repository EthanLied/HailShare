<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - HailShare</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f5f5f5;
    }

    /* Top bar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background-color: #ddd;
      font-weight: bold;
    }

    /* Main container */
    .container {
      display: flex;
      width: 80%;
      margin: 40px auto;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    /* Left image section */
    .left {
      flex: 1;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #555;
    }

    /* Right form section */
    .right {
      flex: 1;
      padding: 50px;
    }

    .right h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background-color: #999;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    .links {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .links a {
      display: block;
      margin-top: 8px;
      color: black;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Navigationbar -->
  <div class="navbar">
    <div>HailShare</div>
    <div>Con Con Con Con Con</div>
  </div>

  <!-- Main Content -->
  <div class="container">

    <!-- Left Image -->
    <div class="left">
      Image
    </div>

    <!-- Right Login Form -->
    <div class="right">
      <h2>Login</h2>

      <div class="form-group">
        <label>Email / Phone Number</label>
        <input type="text" placeholder="">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="">
      </div>

      <button class="btn">Login</button>

      <div class="links">
        <a href="registration1.html">I'm New Here</a>
        <a href="password-recovery.html">Forgot Password?</a>
      </div>
    </div>

  </div>

</body>
</html>
