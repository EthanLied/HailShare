<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - HailShare</title>

  <!-- Link to CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navigation bar -->
  <div class="navbar">
    <div>HailShare</div>
    <div>Con Con Con Con Con</div>
  </div>

  <!-- Main Content -->
  <div class="container">

    <!-- Left Image -->
    <div class="left">
      Image
    </div>

    <!-- Right Form -->
    <div class="right">
      <h2>Forgot Password?</h2>

      <div class="form-group">
        <label>Email / Phone Number</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Security Question</label>
        <select>
          <option disabled selected hidden></option>
          <option>What is your pet's name?</option>
          <option>What is your school name?</option>
        </select>
      </div>

      <div class="form-group">
        <label>Answer</label>
        <input type="text">
      </div>

      <button class="btn">Submit</button>

      <div class="bottom-link">
        <a href="login.html">Back to Login</a>
      </div>
    </div>

  </div>

</body>
</html>
