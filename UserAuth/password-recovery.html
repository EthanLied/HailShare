<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - HailShare</title>

  <!-- Link to CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navigation bar -->
  <div class="navbar">
    <div class="nav-left">HailShare</div>
    <div class="nav-right">
        <a href="login.html">Login</a>
        <a href="registration 1.html">Register</a>
</div>
  </div>

  <!-- Main Content -->
  <div class="container">

    <!-- Left Image -->
    <div class="left">
      Image
    </div>

    <!-- Right Form -->
    <div class="right">
      <div class="form-box">

      <h2>Forgot<br>Password?</h2>

      <div class="form-group">
        <label>Email / Phone Number</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Security Question</label>
        <select>
          <option disabled selected hidden></option>
          <option>What is your pet's name?</option>
          <option>What is your school name?</option>
        </select>
      </div>

      <div class="form-group">
        <label>Answer</label>
        <input type="text">
      </div>

      <button onclick="window.location.href='login.html'"class="btn">Confirm</button>

      <div class="bottom-link">
        <a href="login.html">Back to Login</a>
      </div>

      </div>
    </div>

  </div>

</body>
</html>
