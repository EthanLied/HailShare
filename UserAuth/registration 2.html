<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account - Step 2</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f5f5f5;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background-color: #ddd;
      font-weight: bold;
    }

    /* ✅ SAME Step indicator position (DO NOT CHANGE) */
    .steps {
      position: absolute;
      left: 80px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .step {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #bbb;
    }

    .step.active {
      background-color: #555;
    }

    .line {
      width: 2px;
      height: 40px;
      background-color: #ccc;
      margin: 5px 0;
    }

    /* Container */
    .container {
      width: 600px;
      margin: 60px auto;
      background: #eee;
      padding: 40px;
      border-radius: 8px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Form */
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    /* DOB inline */
    .dob {
      display: flex;
      gap: 10px;
    }

    /* Buttons */
    .button-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .btn {
      width: 120px;
      padding: 10px;
      background-color: #999;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Bottom link */
    .bottom-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .bottom-link a {
      text-decoration: underline;
      color: black;
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div>HailShare</div>
    <div>Con Con Con Con Con</div>
  </div>

  <!-- ✅ SAME Step Indicator -->
  <div class="steps">
    <div class="step active"></div>
    <div class="line"></div>
    <div class="step active"></div>
    <div class="line"></div>
    <div class="step"></div>
  </div>

  <!-- Form -->
  <div class="container">
    <h2>Create Your Account</h2>

    <!-- Password + DOB -->
    <div class="form-row">
      <div class="form-group">
        <label>Password</label>
        <input type="password">
      </div>

      <div class="form-group">
        <label>Date Of Birth</label>
        <div class="dob">
          <select><option>Day</option></select>
          <select><option>Month</option></select>
          <select><option>Year</option></select>
        </div>
      </div>
    </div>

    <!-- Security Question -->
    <div class="form-row">
      <div class="form-group">
        <label>Security Question</label>
        <select required>
          <option value="" disabled selected hidden></option>
          <option>What is your pet's name?</option>
          <option>What is your school name?</option>
          <option>What is your favorite food?</option>
        </select>
      </div>

      <div class="form-group">
        <label>Security Question Answer</label>
        <input type="text">
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-row">
      <button class="btn" onclick="location.href='registration1.html'">Back</button>
      <button class="btn">Next</button>
    </div>

    <div class="bottom-link">
      <a href="login.html">I have an account</a>
    </div>
  </div>

</body>
</html>
