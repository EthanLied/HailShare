<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account - HailShare</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f5f5f5;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background-color: #ddd;
      font-weight: bold;
    }

    /* Step indicator (LEFT SIDE - FIXED POSITION) */
    .steps {
      position: absolute;
      left: 80px;             /* distance from left */
      top: 50%;               /* center vertically */
      transform: translateY(-50%); /* perfect vertical center */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .step {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #bbb;
    }

    .step.active {
      background-color: #555;
    }

    .line {
      width: 2px;
      height: 40px;
      background-color: #ccc;
      margin: 5px 0;
    }

    /* Container */
    .container {
      width: 600px;
      margin: 60px auto;
      background: #eee;
      padding: 40px;
      border-radius: 8px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Form */
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    /* Button */
    .btn {
      display: block;
      width: 200px;
      margin: 20px auto;
      padding: 12px;
      background-color: #999;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Bottom link */
    .bottom-link {
      text-align: center;
      font-size: 14px;
    }

    .bottom-link a {
      text-decoration: underline;
      color: black;
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div>HailShare</div>
    <div>Con Con Con Con Con</div>
  </div>

  <!-- Step Indicator -->
  <div class="steps">
    <div class="step active"></div>
    <div class="line"></div>
    <div class="step"></div>
    <div class="line"></div>
    <div class="step"></div>
  </div>

  <!-- Form -->
  <div class="container">
    <h2>Create Your Account</h2>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text">
      </div>
    </div>

    <button class="btn">Next</button>

    <div class="bottom-link">
      <a href="login.html">I have an account</a>
    </div>
  </div>

</body>
</html>
