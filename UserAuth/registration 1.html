<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account - HailShare</title>
  
  <!-- Link to CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div>HailShare</div>
    <div>Con Con Con Con Con</div>
  </div>

  <!-- Step Indicator -->
  <div class="steps">
    <div class="step active"></div>
    <div class="line"></div>
    <div class="step"></div>
    <div class="line"></div>
    <div class="step"></div>
  </div>

  <!-- Form -->
  <div class="reg-container">
    <h2>Create Your Account</h2>

    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text">
      </div>
    </div>

    <button class="btn">Next</button>

    <div class="bottom-link">
      <a href="login.html">I have an account</a>
    </div>
  </div>

</body>
</html>
