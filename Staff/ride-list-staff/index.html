<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride List – HailShare Staff</title>
    <link rel="stylesheet" href="shadCNTemplate.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app-shell">

        <aside class="sidebar" id="sidebar">
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle navigation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
                <span class="brand-name">HailShare</span>
            </button>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item active" title="Ride List"><svg width="18" height="18"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="9" y1="6" x2="20" y2="6" />
                        <line x1="9" y1="12" x2="20" y2="12" />
                        <line x1="9" y1="18" x2="20" y2="18" />
                        <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none" />
                        <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none" />
                        <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none" />
                    </svg><span class="nav-label">Ride List</span></a>
                <a href="C:\test 17\HailShare\Staff\business-analytics-staff\index.html" class="nav-item"
                    title="Analytics"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="12" width="4" height="10" />
                        <rect x="9" y="7" width="4" height="15" />
                        <rect x="16" y="3" width="4" height="19" />
                    </svg><span class="nav-label">Analytics</span></a>
                <a href="C:\test 17\HailShare\Staff\live-chat-staff\index.html" class="nav-item" title="Live Chat"><svg
                        width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z" />
                        <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
                    </svg><span class="nav-label">Live Chat</span></a>
            </nav>
            <div class="sidebar-bottom">
                <a href="C:\test 17\HailShare\Staff\profile-staff\index.html" class="nav-item" title="Profile"><svg
                        width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg><span class="nav-label">Profile</span></a>
            </div>
        </aside>

        <main class="main-content">

            <!-- ── View: Ride List ──────────────────────────────────── -->
            <div id="rideListView">
                <div class="page-header">
                    <h1 class="page-title">Ride List</h1>
                </div>

                <div class="controls-bar">
                    <div class="control-group">
                        <label for="sortBy">Sort By:</label>
                        <select id="sortBy">
                            <option value="">— select —</option>
                            <option value="date-asc">Date (Oldest first)</option>
                            <option value="date-desc">Date (Newest first)</option>
                            <option value="price-asc">Price (Low → High)</option>
                            <option value="price-desc">Price (High → Low)</option>
                            <option value="people-asc">People (Low → High)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="filterBy">Filter By:</label>
                        <select id="filterBy">
                            <option value="">All Status</option>
                            <option value="Active">Active</option>
                            <option value="Pending">Pending</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>

                <div class="ride-list" id="rideList"></div>
            </div>

            <!-- ── View: Modify Ride ─────────────────────────────────── -->
            <div id="modifyRideView" class="hidden">
                <div class="page-header">
                    <button class="btn-back btnNormal" id="backToList">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                        Back
                    </button>
                    <h1 class="page-title">Modify Ride <span id="modifyRideId" class="ride-id-badge"></span></h1>
                </div>

                <div class="form-card">
                    <form id="modifyForm" novalidate>
                        <div class="form-group">
                            <label for="modifyFrom">From:</label>
                            <input type="text" id="modifyFrom" placeholder="Origin location" required />
                        </div>
                        <div class="form-group">
                            <label for="modifyTo">To:</label>
                            <input type="text" id="modifyTo" placeholder="Destination location" required />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="modifyDate">Date:</label>
                                <select id="modifyDate"></select>
                            </div>
                            <div class="form-group">
                                <label for="modifyTime">Time:</label>
                                <select id="modifyTime"></select>
                            </div>
                            <div class="form-group">
                                <label for="modifyCapacity">Capacity:</label>
                                <select id="modifyCapacity">
                                    <option>1</option>
                                    <option>2</option>
                                    <option>3</option>
                                    <option>4</option>
                                    <option>5</option>
                                    <option>6</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="modifyPrice">Price (RM):</label>
                                <input type="number" id="modifyPrice" step="0.5" min="0" placeholder="0.00" />
                            </div>
                        </div>
                        <div class="form-group form-group-sm">
                            <label for="modifyStatus">Status:</label>
                            <select id="modifyStatus">
                                <option value="Active">Active</option>
                                <option value="Pending">Pending</option>
                                <option value="Completed">Completed</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btnStrong save-btn">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
</body>

</html>
