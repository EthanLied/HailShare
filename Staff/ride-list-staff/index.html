<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride List – HailShare Staff</title>
    <link rel="stylesheet" href="shadCNTemplate.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="script.js" defer></script>
</head>

<body>
    <div id="navbar">
        <div class="navbarItem">
            <span class="material-symbols-outlined" id="hamburgerMenuNavbarIcon" onclick="toggleNavbar()">menu</span>
            <a href="">
                <h3>HailShare</h3>
            </a>
        </div>
        <a href="../ride-list-staff/index.html">
            <div class="navbarItem"><span class="material-symbols-outlined">list_alt</span>
                <p>Ride List</p>
            </div>
        </a>
        <a href="../business-analytics-staff/index.html">
            <div class="navbarItem"><span class="material-symbols-outlined">bar_chart</span>
                <p>Analytics</p>
            </div>
        </a>
        <a href="../live-chat-staff/index.html">
            <div class="navbarItem"><span class="material-symbols-outlined">support_agent</span>
                <p>Live Chat</p>
            </div>
        </a>
        <a href="../profile-staff/index.html">
            <div class="navbarItem"><span class="material-symbols-outlined">account_circle</span>
                <p>Profile</p>
            </div>
        </a>
    </div>

    <div id="content">
        <div class="content-wrapper">

            <!-- Ride List View -->
            <div id="rideListView">
                <h1 class="page-title">Ride List</h1>
                <div class="controls-bar">
                    <div class="control-group">
                        <label for="sortBy">Sort By:</label>
                        <select id="sortBy">
                            <option value="">— select —</option>
                            <option value="date-asc">Date (Oldest first)</option>
                            <option value="date-desc">Date (Newest first)</option>
                            <option value="price-asc">Price (Low → High)</option>
                            <option value="price-desc">Price (High → Low)</option>
                            <option value="people-asc">People (Low → High)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="filterBy">Filter By:</label>
                        <select id="filterBy">
                            <option value="">All Status</option>
                            <option value="Active">Active</option>
                            <option value="Pending">Pending</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>

                <!-- scrollable container -->
                <div class="list-scroll-container">
                    <div id="rideList"></div>
                </div>

                <div class="pagination">
                    <span id="pageInfo">Page 1 / 1</span>
                    <button class="btnNormal pag-btn" id="prevPage" disabled>&#8249;</button>
                    <button class="btnNormal pag-btn" id="nextPage">&#8250;</button>
                </div>
            </div>

            <!-- Modify Ride View -->
            <div id="modifyRideView" class="hidden">
                <div class="page-header-row">
                    <button class="btnNormal btn-back" id="backToList">&#8249; Back</button>
                    <h1 class="page-title">Modify Ride <span id="modifyRideId" class="ride-id-tag"></span></h1>
                </div>
                <div class="form-card">
                    <form id="modifyForm" novalidate>
                        <div class="form-group">
                            <label for="modifyFrom">From:</label>
                            <input type="text" id="modifyFrom" placeholder="Origin location" />
                        </div>
                        <div class="form-group">
                            <label for="modifyTo">To:</label>
                            <input type="text" id="modifyTo" placeholder="Destination location" />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="modifyDate">Date:</label>
                                <select id="modifyDate"></select>
                            </div>
                            <!-- TIME: two dropdowns (hour + minute) -->
                            <div class="form-group">
                                <label>Time:</label>
                                <div class="time-row">
                                    <select id="modifyHour" aria-label="Hour"></select>
                                    <span class="time-sep">:</span>
                                    <select id="modifyMinute" aria-label="Minute"></select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="modifyCapacity">Capacity:</label>
                                <select id="modifyCapacity">
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="modifyPrice">Price (RM):</label>
                                <input type="number" id="modifyPrice" step="0.50" min="0" />
                            </div>
                            <div class="form-group">
                                <label for="modifyStatus">Status:</label>
                                <select id="modifyStatus">
                                    <option value="Active">Active</option>
                                    <option value="Pending">Pending</option>
                                    <option value="Completed">Completed</option>
                                    <option value="Cancelled">Cancelled</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btnStrong">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>

</html>
