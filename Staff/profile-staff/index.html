<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app-shell">

        <aside class="sidebar" id="sidebar">
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle navigation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
                <span class="brand-name">HailShare</span>
            </button>
            <nav class="sidebar-nav">
                <a href="C:\test 17\HailShare\Staff\ride-list-staff\index.html" class="nav-item" title="Ride List">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="9" y1="6" x2="20" y2="6" />
                        <line x1="9" y1="12" x2="20" y2="12" />
                        <line x1="9" y1="18" x2="20" y2="18" />
                        <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none" />
                        <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none" />
                        <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none" />
                    </svg>
                    <span class="nav-label">Ride List</span>
                </a>
                <a href="C:\test 17\HailShare\Staff\business-analytics-staff\index.html" class="nav-item"
                    title="Analytics">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="12" width="4" height="10" />
                        <rect x="9" y="7" width="4" height="15" />
                        <rect x="16" y="3" width="4" height="19" />
                    </svg>
                    <span class="nav-label">Analytics</span>
                </a>
                <a href="C:\test 17\HailShare\Staff\live-chat-staff\index.html" class="nav-item" title="Live Chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z" />
                        <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
                    </svg>
                    <span class="nav-label">Live Chat</span>
                </a>
            </nav>
            <div class="sidebar-bottom">
                <a href="C:\test 17\HailShare\Staff\profile-staff\index.html" class="nav-item active" title="Profile">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <span class="nav-label">Profile</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Profile</h1>
            </div>

            <!-- Personal Info -->
            <div class="form-card">
                <h2 class="card-title">Personal Information</h2>
                <form id="personalForm" novalidate>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" placeholder="First name" />
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" placeholder="Last name" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="email@example.com" />
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="+60 1X-XXXXXXXX" />
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <div class="dob-row">
                            <select id="dobDay" aria-label="Day"></select>
                            <select id="dobMonth" aria-label="Month"></select>
                            <select id="dobYear" aria-label="Year"></select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btnStrong save-btn">Update Info</button>
                    </div>
                </form>
            </div>

            <!-- Security -->
            <div class="form-card">
                <h2 class="card-title">Security</h2>
                <p class="card-hint">Enter your current password to update security information.</p>
                <form id="securityForm" novalidate>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div class="input-with-icon">
                            <input type="password" id="newPassword" placeholder="New password"
                                autocomplete="new-password" />
                            <button type="button" class="toggle-pw" data-target="newPassword"
                                aria-label="Show password">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="securityQuestion">Security Question</label>
                        <select id="securityQuestion">
                            <option value="">— Select a question —</option>
                            <option>What is the name of your first pet?</option>
                            <option>What was your childhood nickname?</option>
                            <option>What city were you born in?</option>
                            <option>What is your mother's maiden name?</option>
                            <option>What was the name of your primary school?</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="securityAnswer">Security Answer</label>
                        <input type="text" id="securityAnswer" placeholder="Your answer" autocomplete="off" />
                    </div>
                    <hr class="form-divider" />
                    <div class="form-group">
                        <label for="currentPassword">
                            Current Password
                            <span class="required-hint">(required to save changes)</span>
                        </label>
                        <div class="input-with-icon">
                            <input type="password" id="currentPassword" placeholder="Enter current password"
                                autocomplete="current-password" />
                            <button type="button" class="toggle-pw" data-target="currentPassword"
                                aria-label="Show password">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btnStrong save-btn">Update Security</button>
                    </div>
                </form>
            </div>

            <!-- Logout -->
            <div class="logout-section">
                <button class="btnNormal logout-btn" id="logoutBtn">Logout</button>
            </div>

        </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
</body>

</html>
