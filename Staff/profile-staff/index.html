<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile – HailShare Staff</title>
    <link rel="stylesheet" href="shadCNTemplate.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="script.js" defer></script>
</head>

<body>
    <div id="navbar">
        <div class="navbarItem">
            <span class="material-symbols-outlined" id="hamburgerMenuNavbarIcon" onclick="toggleNavbar()">menu</span>
            <a href="">
                <h3>HailShare</h3>
            </a>
        </div>
        <a href="ride-list-staff.html">
            <div class="navbarItem"><span class="material-symbols-outlined">list_alt</span>
                <p>Ride List</p>
            </div>
        </a>
        <a href="business-analytics-staff.html">
            <div class="navbarItem"><span class="material-symbols-outlined">bar_chart</span>
                <p>Analytics</p>
            </div>
        </a>
        <a href="live-chat-staff.html">
            <div class="navbarItem"><span class="material-symbols-outlined">support_agent</span>
                <p>Live Chat</p>
            </div>
        </a>
        <a href="profile-staff.html">
            <div class="navbarItem"><span class="material-symbols-outlined">account_circle</span>
                <p>Profile</p>
            </div>
        </a>
    </div>
    <div id="content">
        <div class="content-wrapper">
            <h1 class="page-title">Profile</h1>

            <div class="form-card">
                <h2 class="card-title">Personal Information</h2>
                <form id="personalForm" novalidate>
                    <div class="form-row-2">
                        <div class="form-group"><label for="firstName">First Name</label><input type="text"
                                id="firstName" placeholder="First name" /></div>
                        <div class="form-group"><label for="lastName">Last Name</label><input type="text" id="lastName"
                                placeholder="Last name" /></div>
                    </div>
                    <div class="form-group"><label for="email">Email</label><input type="email" id="email"
                            placeholder="email@example.com" /></div>
                    <div class="form-group"><label for="phone">Phone Number</label><input type="tel" id="phone"
                            placeholder="+60 1X-XXXXXXXX" /></div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <div class="dob-row">
                            <select id="dobDay" aria-label="Day"></select>
                            <select id="dobMonth" aria-label="Month"></select>
                            <select id="dobYear" aria-label="Year"></select>
                        </div>
                    </div>
                    <div class="form-actions"><button type="submit" class="btnStrong">Update Info</button></div>
                </form>
            </div>

            <div class="form-card">
                <h2 class="card-title">Security</h2>
                <p class="card-hint">Enter your current password to update security information.</p>
                <form id="securityForm" novalidate>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <div class="input-with-icon">
                            <input type="password" id="newPassword" placeholder="New password"
                                autocomplete="new-password" />
                            <button type="button" class="toggle-pw" data-target="newPassword"
                                aria-label="Show password">
                                <span class="material-symbols-outlined" style="font-size:17px">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="securityQuestion">Security Question</label>
                        <select id="securityQuestion">
                            <option value="">— Select a question —</option>
                            <option>What is the name of your first pet?</option>
                            <option>What was your childhood nickname?</option>
                            <option>What city were you born in?</option>
                            <option>What is your mother's maiden name?</option>
                            <option>What was the name of your primary school?</option>
                        </select>
                    </div>
                    <div class="form-group"><label for="securityAnswer">Security Answer</label><input type="text"
                            id="securityAnswer" placeholder="Your answer" autocomplete="off" /></div>
                    <hr class="form-divider" />
                    <div class="form-group">
                        <label for="currentPassword">Current Password <span class="required-hint">(required to
                                save)</span></label>
                        <div class="input-with-icon">
                            <input type="password" id="currentPassword" placeholder="Enter current password"
                                autocomplete="current-password" />
                            <button type="button" class="toggle-pw" data-target="currentPassword"
                                aria-label="Show password">
                                <span class="material-symbols-outlined" style="font-size:17px">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="form-actions"><button type="submit" class="btnStrong">Update Security</button></div>
                </form>
            </div>

            <div class="logout-section">
                <button class="btnNormal logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>

</html>
