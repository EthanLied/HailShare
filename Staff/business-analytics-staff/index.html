<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Analytics – HailShare Staff</title>
    <link rel="stylesheet" href="shadCNTemplate.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- Chart.js MUST load synchronously before our script -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="script.js" defer></script>
</head>

<body>
    <div id="navbar">
        <div class="navbarItem">
            <span class="material-symbols-outlined" id="hamburgerMenuNavbarIcon" onclick="toggleNavbar()">menu</span>
            <a href="">
                <h3>HailShare</h3>
            </a>
        </div>
        <a href="../ride-list/ride-list.html">
            <div class="navbarItem"><span class="material-symbols-outlined">list_alt</span>
                <p>Ride List</p>
            </div>
        </a>
        <a href="../business-analytics/business-analytics.html">
            <div class="navbarItem"><span class="material-symbols-outlined">bar_chart</span>
                <p>Analytics</p>
            </div>
        </a>
        <a href="../live-chat/live-chat.html">
            <div class="navbarItem"><span class="material-symbols-outlined">support_agent</span>
                <p>Live Chat</p>
            </div>
        </a>
        <a href="../profile/profile.html">
            <div class="navbarItem"><span class="material-symbols-outlined">account_circle</span>
                <p>Profile</p>
            </div>
        </a>
    </div>
    <div id="content">
        <div class="content-wrapper">
            <h1 class="page-title">Business Analytics</h1>
            <div class="analytics-card">
                <div class="analytics-toolbar">
                    <select id="metricSelect">
                        <option value="ridesHosted">Rides Hosted</option>
                        <option value="revenue">Revenue (RM)</option>
                        <option value="activeUsers">Active Users</option>
                    </select>
                    <select id="periodSelect">
                        <option value="thisMonth">This Month</option>
                        <option value="lastMonth">Last Month</option>
                        <option value="last3Months">Last 3 Months</option>
                        <option value="thisYear">This Year</option>
                    </select>
                    <button class="btnNormal download-btn" id="downloadCsv">
                        <span class="material-symbols-outlined"
                            style="font-size:16px;vertical-align:middle">download</span>
                        Download CSV
                    </button>
                </div>
                <div class="chart-wrap"><canvas id="analyticsChart"></canvas></div>
            </div>
            <div class="records-section">
                <h2 class="section-title">Records</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Ride #</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Date</th>
                                <th>People</th>
                                <th>Revenue (RM)</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTbody"></tbody>
                    </table>
                </div>
                <div class="pagination">
                    <span id="pageInfo">Page 1 / 1</span>
                    <button class="btnNormal pag-btn" id="prevPage" disabled>&#8249;</button>
                    <button class="btnNormal pag-btn" id="nextPage">&#8250;</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>

</html>
