<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Analytics – HailShare Staff</title>
    <link rel="stylesheet" href="shadCNTemplate.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" defer></script>
</head>

<body>
    <div class="app-shell">

        <aside class="sidebar" id="sidebar">
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle navigation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
                <span class="brand-name">HailShare</span>
            </button>
            <nav class="sidebar-nav">
                <a href="C:\test 17\HailShare\Staff\ride-list-staff\index.html" class="nav-item" title="Ride List"><svg
                        width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="9" y1="6" x2="20" y2="6" />
                        <line x1="9" y1="12" x2="20" y2="12" />
                        <line x1="9" y1="18" x2="20" y2="18" />
                        <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none" />
                        <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none" />
                        <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none" />
                    </svg><span class="nav-label">Ride List</span></a>
                <a href="index.html" class="nav-item active" title="Analytics"><svg width="18" height="18"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="2" y="12" width="4" height="10" />
                        <rect x="9" y="7" width="4" height="15" />
                        <rect x="16" y="3" width="4" height="19" />
                    </svg><span class="nav-label">Analytics</span></a>
                <a href="C:\test 17\HailShare\Staff\live-chat-staff\index.html" class="nav-item" title="Live Chat"><svg
                        width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z" />
                        <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
                    </svg><span class="nav-label">Live Chat</span></a>
            </nav>
            <div class="sidebar-bottom">
                <a href="C:\test 17\HailShare\Staff\profile-staff\index.html" class="nav-item" title="Profile"><svg
                        width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg><span class="nav-label">Profile</span></a>
            </div>
        </aside>

        <main class="main-content">

            <div class="page-header">
                <h1 class="page-title">Business Analytics</h1>
            </div>

            <!-- ── Chart section ──────────────────────────────── -->
            <div class="analytics-card">
                <div class="analytics-toolbar">
                    <select id="metricSelect">
                        <option value="ridesHosted">Rides Hosted</option>
                        <option value="revenue">Revenue (RM)</option>
                        <option value="activeUsers">Active Users</option>
                    </select>
                    <select id="periodSelect">
                        <option value="thisMonth">This Month</option>
                        <option value="lastMonth">Last Month</option>
                        <option value="last3Months">Last 3 Months</option>
                        <option value="thisYear">This Year</option>
                    </select>
                    <button class="btnNormal download-btn" id="downloadCsv">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Download CSV
                    </button>
                </div>
                <div class="chart-wrap">
                    <canvas id="analyticsChart"></canvas>
                </div>
            </div>

            <!-- ── Records table ───────────────────────────────── -->
            <div class="records-section">
                <h2 class="section-title">Records</h2>
                <div class="table-wrap">
                    <table id="recordsTable">
                        <thead>
                            <tr>
                                <th>Ride #</th>
                                <th>From</th>
                                <th>To</th>
                                <th>Date</th>
                                <th>People</th>
                                <th>Revenue (RM)</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTbody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination">
                    <span id="pageInfo">Page 1 / 1</span>
                    <button class="btnNormal pag-btn" id="prevPage" disabled>&#8249;</button>
                    <button class="btnNormal pag-btn" id="nextPage">&#8250;</button>
                </div>
            </div>

        </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
</body>

</html>
