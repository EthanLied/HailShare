<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Analytics – HailShare Staff</title>
    <link rel="stylesheet" href="../business-analytics-staff/shadCNTemplate.css" />
    <link rel="stylesheet" href="../business-analytics-staff/mobile.css" />
    <link rel="stylesheet" href="../business-analytics-staff/style.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="../business-analytics-staff/script.js" defer></script>
</head>

<body>
    <div id="navbar">
        <div class="navbarItem">
            <span class="material-symbols-outlined" id="hamburgerMenuNavbarIcon" onclick="toggleNavbar()">menu</span>
            <a href="../ride-list-staff/index.html">
                <h3>HailShare</h3>
            </a>
        </div>
        <a href="../ride-list-staff/index.html">
            <div class="navbarItem"><span class="material-symbols-outlined">list_alt</span>
                <p>Ride List</p>
            </div>
        </a>
        <a href="../business-analytics-staff/index.html">
            <div class="navbarItem"><span class="material-symbols-outlined">bar_chart</span>
                <p>Analytics</p>
            </div>
        </a>
        <a href="../live-chat-staff/index.html">
            <div class="navbarItem"><span class="material-symbols-outlined">support_agent</span>
                <p>Live Chat</p>
            </div>
        </a>
        <a href="../profile-staff/index.html">
            <div class="navbarItem"><span class="material-symbols-outlined">account_circle</span>
                <p>Profile</p>
            </div>
        </a>
    </div>
    <div id="content">
        <div class="content-wrapper">
            <h1 class="page-title">Business Analytics</h1>
            <div class="section-card">
                <div class="chart-controls">
                    <select id="metricSelect" class="desktopComponent">
                        <option value="rides">Rides Hosted</option>
                        <option value="revenue">Revenue (RM)</option>
                        <option value="users">Active Users</option>
                    </select>
                    <div class="custom-select-container mobileComponent" id="metricContainer">
                        <div class="custom-select-trigger" id="metricTrigger">Rides Hosted</div>
                        <div class="custom-popup" id="metricPopup">
                            <div class="custom-popup-item" data-val="rides">Rides Hosted</div>
                            <div class="custom-popup-item" data-val="revenue">Revenue (RM)</div>
                            <div class="custom-popup-item" data-val="users">Active Users</div>
                        </div>
                    </div>
                    <select id="periodSelect" class="desktopComponent">
                        <option value="month">This Month</option>
                        <option value="week">This Week</option>
                        <option value="quarter">This Quarter</option>
                    </select>
                    <div class="custom-select-container mobileComponent" id="periodContainer">
                        <div class="custom-select-trigger" id="periodTrigger">This Month</div>
                        <div class="custom-popup" id="periodPopup">
                            <div class="custom-popup-item" data-val="month">This Month</div>
                            <div class="custom-popup-item" data-val="week">This Week</div>
                            <div class="custom-popup-item" data-val="quarter">This Quarter</div>
                        </div>
                    </div>
                    <button class="btnNormal btn-download" id="downloadCsvBtn">
                        <span class="material-symbols-outlined">download</span>
                        Download CSV
                    </button>
                </div>
                <div class="chart-wrapper">
                    <canvas id="analyticsChart" aria-label="Analytics chart"></canvas>
                </div>
            </div>
            <div class="section-card records-section">
                <h2 class="section-title">Records</h2>
                <div class="table-scroll">
                    <table id="recordsTable">
                        <thead>
                            <tr>
                                <th>Ride ID</th>
                                <th>Date</th>
                                <th>Route</th>
                                <th>Passengers</th>
                                <th>Revenue (RM)</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="recordsBody"></tbody>
                    </table>
                </div>
                <div class="pagination">
                    <span id="pageInfo">Page 1 / 1</span>
                    <button class="btnNormal pag-btn" id="prevPage" disabled>&#8249;</button>
                    <button class="btnNormal pag-btn" id="nextPage">&#8250;</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>

</html>
