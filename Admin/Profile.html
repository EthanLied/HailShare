<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="Admin.css">
</head>

<body style="margin:0; display:flex;">

<!-- SIDEBAR -->
<div style="width:200px; background:#e9e9e9; height:100vh; padding:15px;">
    <title>Dashboard</title>

    <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
        <a href="index.html"><button class="btnNormal">Home</button></a>
        <a href="admin.html"><button class="btnNormal">Admin</button></a>
        <a href="profile.html"><button class="btnNormal">Account</button></a>
    </div>
</div>

<!-- CONTENT -->
<div style="flex:1; padding:30px; max-width:600px;">

    <title>Profile</title>

    <!-- BASIC INFO -->
    <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
        <input placeholder="Name">
        <input placeholder="Email">
        <input placeholder="Phone Number">

        <div>
            <description>DOB</description>
            <div style="display:flex; gap:10px;">
                <select><option>Day</option></select>
                <select><option>Month</option></select>
                <select><option>Year</option></select>
            </div>
        </div>
    </div>

    <!-- SECURITY SECTION -->
    <div style="margin-top:30px; border:1px solid #ccc; border-radius:8px;">

        <!-- CLICK HEADER -->
        <div onclick="toggleSecurity()" style="padding:10px; cursor:pointer;">
            <title>Password & Security</title>
        </div>

        <!-- HIDDEN CONTENT -->
        <div id="securityBox" style="display:none; padding:10px; border-top:1px solid #ccc;">

            <description>Answer security question to continue</description>

            <select style="margin-top:10px;">
                <option>What is your pet's name?</option>
                <option>Mother's maiden name?</option>
            </select>

            <input placeholder="Your Answer" style="margin-top:10px;">

            <!-- CHANGE PASSWORD -->
            <div style="margin-top:20px;">
                <description>Change Password</description>
                <input type="password" placeholder="New Password" style="margin-top:10px;">
            </div>

        </div>
    </div>

</div>

<script>
function toggleSecurity(){
    const box = document.getElementById("securityBox");
    box.style.display = (box.style.display === "none") ? "block" : "none";
}
</script>

</body>
</html>
